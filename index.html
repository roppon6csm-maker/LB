<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Management Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2d2d2d;
            --accent-color: #bb86fc;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-color: #3d3d3d;
            --row-hover: #252525;
            --row-selected: #332940;
            --status-ok: #03dac6;
            --status-ng: #cf6679;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.4;
            padding-bottom: 60px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        .version-badge {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background-color: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .tabs {
            display: flex;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-3px solid var(--accent-color);
            background-color: rgba(187, 134, 252, 0.05);
        }

        .tab-content {
            display: none;
            padding: 10px;
        }

        .tab-content.active {
            display: block;
        }

        .controls-panel {
            background-color: var(--bg-secondary);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .search-box {
            position: relative;
            margin-bottom: 10px;
        }

        .search-box i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-box input {
            width: 100%;
            padding: 8px 10px 8px 32px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .filter-buttons {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .filter-buttons::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 6px 12px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 15px;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
        }

        .filter-btn.active {
            background-color: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
            background-color: var(--bg-secondary);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: left;
        }

        th {
            background-color: var(--bg-tertiary);
            padding: 10px 8px;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
            color: var(--accent-color);
            cursor: pointer;
            user-select: none;
        }

        th i {
            margin-left: 3px;
            font-size: 0.75rem;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr.selected {
            background-color: var(--row-selected) !important;
        }

        .flag-cell {
            text-align: center;
            font-size: 0.85rem;
        }

        .flag-select {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.75rem;
            cursor: pointer;
            outline: none;
            padding: 2px;
            text-align: center;
            text-align-last: center;
        }

        .flag-select option {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        .yomi-select {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            padding: 2px;
            width: 100%;
        }

        .yomi-select option {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        .action-pane {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 90;
        }

        .active-artist-info {
            font-size: 0.85rem;
            max-width: 40%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .active-artist-info span {
            display: block;
            font-weight: bold;
            color: var(--accent-color);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 14px;
            border-radius: 4px;
            border: none;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #fff;
        }

        .btn-line { background-color: #06C755; }
        .btn-x { background-color: #1DA1F2; }
        .btn-gmail { background-color: #EA4335; }

        .action-btn:disabled {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .template-selector {
            margin-bottom: 12px;
        }

        .template-selector label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .template-select-wrapper {
            display: flex;
            gap: 8px;
        }

        .template-select-wrapper select {
            flex: 1;
            padding: 8px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }

        .preview-box {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            min-height: 120px;
            max-height: 220px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .setting-section {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .setting-section h3 {
            font-size: 0.95rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-section textarea {
            width: 100%;
            height: 120px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 0.8rem;
            padding: 8px;
            resize: vertical;
            outline: none;
        }

        .save-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: var(--accent-color);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        .template-item-edit {
            border: 1px solid var(--border-color);
            background-color: var(--bg-tertiary);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .template-item-edit input {
            width: 100%;
            padding: 6px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.85rem;
            margin-bottom: 6px;
            outline: none;
        }

        .template-item-edit textarea {
            height: 80px;
        }

        .template-ctrls {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }

        .small-btn {
            padding: 4px 8px;
            font-size: 0.75rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 3px;
            cursor: pointer;
        }

        .small-btn.danger {
            color: var(--status-ng);
            border-color: rgba(207, 102, 121, 0.4);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background-color: #323232;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
            max-width: 80%;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .badge {
            display: inline-block;
            padding: 2px 4px;
            font-size: 0.7rem;
            border-radius: 3px;
            font-weight: bold;
            margin-left: 4px;
        }

        .badge-line { background-color: rgba(6, 199, 85, 0.2); color: #06C755; }
        .badge-x { background-color: rgba(29, 161, 242, 0.2); color: #1DA1F2; }
        .badge-gmail { background-color: rgba(234, 67, 53, 0.2); color: #EA4335; }

        .count-indicator {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Artist Management Portal</h1>
        <div class="version-badge">ver.0.0.10</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('list')"><i class="fas fa-list"></i> 演者一覧</button>
        <button class="tab-btn" onclick="switchTab('preview')"><i class="fas fa-eye"></i> 文面確認</button>
        <button class="tab-btn" onclick="switchTab('settings')"><i class="fas fa-cog"></i> 設定</button>
    </div>

    <!-- LIST TAB -->
    <div id="tab-list" class="tab-content active">
        <div class="controls-panel">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="アーティスト、ヨミ、担当者名で検索..." oninput="handleFilterChange()">
            </div>
            <div class="filter-buttons" id="tag-filters">
                <!-- Dynamic tag filters will be injected here -->
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th onclick="handleSort('flag')" style="width: 50px; text-align: center;">出演 <i class="fas fa-sort"></i></th>
                        <th onclick="handleSort('name')">演者名 <i class="fas fa-sort"></i></th>
                        <th onclick="handleSort('yomi')">ヨミ <i class="fas fa-sort"></i></th>
                        <th onclick="handleSort('date')">日程 <i class="fas fa-sort"></i></th>
                        <th onclick="handleSort('time')">出番 <i class="fas fa-sort"></i></th>
                        <th onclick="handleSort('pic')">担当 <i class="fas fa-sort"></i></th>
                    </tr>
                </thead>
                <tbody id="artist-table-body">
                    <!-- Dynamic rows will be injected here -->
                </tbody>
            </table>
        </div>
        <div class="count-indicator" id="row-count-display">0 件表示 / 全 0 件</div>
    </div>

    <!-- PREVIEW TAB -->
    <div id="tab-preview" class="tab-content">
        <div class="template-selector">
            <label for="active-template-select">使用テンプレート</label>
            <div class="template-select-wrapper">
                <select id="active-template-select" onchange="handleTemplateSelectChange()">
                    <!-- Options injected dynamically -->
                </select>
            </div>
        </div>
        <div style="margin-bottom: 6px; font-size: 0.8rem; color: var(--text-secondary); font-weight: bold;">生成メッセージプレビュー</div>
        <div class="preview-box" id="message-preview-container">演者を選択するとここに生成文面が表示されます。</div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="tab-settings" class="tab-content">
        <div class="setting-section">
            <h3>演者マスタデータ (TSV形式)</h3>
            <textarea id="import-artists-raw" placeholder="枠名&#x9;出演&#x9;ヨミ&#x9;アーティスト名&#x9;日程&#x9;出番&#x9;物販&#x9;メール&#x9;LINE&#x9;X&#x9;担当者"></textarea>
            <button class="save-btn" onclick="saveArtistsFromTextarea()">演者データを保存・反映</button>
        </div>

        <div class="setting-section">
            <h3>連絡文面テンプレート設定
                <button class="small-btn" onclick="addNewTemplateItem()"><i class="fas fa-plus"></i> 追加</button>
            </h3>
            <div id="template-editor-list">
                <!-- Template item editors will be injected here -->
            </div>
            <button class="save-btn" onclick="saveTemplatesFromEditor()">テンプレートを保存・反映</button>
        </div>
    </div>

    <!-- FIXED ACTION PANE -->
    <div class="action-pane">
        <div class="active-artist-info" id="active-artist-summary">
            選択なし
        </div>
        <div class="action-buttons">
            <button class="action-btn btn-line" id="action-btn-line" onclick="executeExternalDispatch('line')" disabled>
                <i class="fab fa-line"></i> LINE
            </button>
            <button class="action-btn btn-x" id="action-btn-x" onclick="executeExternalDispatch('x')" disabled>
                <i class="fab fa-twitter"></i> X
            </button>
            <button class="action-btn btn-gmail" id="action-btn-gmail" onclick="executeExternalDispatch('gmail')" disabled>
                <i class="fas fa-envelope"></i> Gmail
            </button>
        </div>
    </div>

    <div class="toast" id="toast-banner">コピーしました</div>

    <script>
        // Default System Fallbacks
        const initialDefaultTemplates = [
            { id: "t1", title: "前日確認連絡", body: "【前日確認】\n{日程} {出番}出番\n{アーティスト名}様\n\nお世話になっております。明日のスケジュールになります。\n出番時間帯、並びに添付要項をご確認の上お越しください。\nよろしくお願いいたします。" },
            { id: "t2", title: "お礼・忘れ物連絡", body: "{アーティスト名}様\n\n本日はご出演いただき誠にありがとうございました。\nまたのご出演を心よりお待ちしております。\n\n※忘れ物のご連絡\n楽屋に傘の忘れ物がございました。お心当たりがございましたらご連絡ください。" }
        ];

        const initialDefaultArtistsRaw = "枠名\t出演\tヨミ\tアーティスト名\t日程\t出番\t物販\tメール\tLINE\tX\t担当者\nサンプル枠1\t🚩\t10\tサンプルバンドA\t6/14日\t18:00\t19:00\ttest@example.com\thttp://line.me/ti/p/sample\tsample_auth\t山田\nサンプル枠2\t\t0\tアイドルユニットB\t6/15月\t19:30\t20:30\t\t\t\t佐藤";

        // Application Global State
        let appState = {
            artists: [],
            templates: [],
            selectedArtistId: null,
            selectedTemplateIndex: 0,
            currentSortField: 'yomi',
            currentSortAscending: true,
            activeFilterTag: 'ALL'
        };

        // Initialize Application
        window.addEventListener('DOMContentLoaded', () => {
            loadSavedDataFromStorage();
            renderApplicationView();
        });

        function loadSavedDataFromStorage() {
            // Load templates
            const storedTemplates = localStorage.getItem('amp_templates');
            if (storedTemplates) {
                try { appState.templates = JSON.parse(storedTemplates); } catch(e) { appState.templates = [...initialDefaultTemplates]; }
            } else {
                appState.templates = [...initialDefaultTemplates];
            }

            // Load artists
            const storedArtistsRaw = localStorage.getItem('amp_artists_raw');
            if (storedArtistsRaw !== null) {
                document.getElementById('import-artists-raw').value = storedArtistsRaw;
                appState.artists = parseTsvToArtistObjects(storedArtistsRaw);
            } else {
                document.getElementById('import-artists-raw').value = initialDefaultArtistsRaw;
                appState.artists = parseTsvToArtistObjects(initialDefaultArtistsRaw);
                localStorage.setItem('amp_artists_raw', initialDefaultArtistsRaw);
            }

            // Sync raw template views
            refreshTemplateEditorStructure();
        }

        function parseTsvToArtistObjects(tsvText) {
            if (!tsvText || !tsvText.trim()) return [];
            const rows = tsvText.split('\n');
            if (rows.length <= 1) return [];

            const headers = rows[0].split('\t').map(h => h.trim());
            const parsedList = [];

            // Mapping definitions
            const indexSlot = {
                waku: headers.indexOf("枠名"),
                flag: headers.indexOf("出演"),
                yomi: headers.indexOf("ヨミ"),
                name: headers.indexOf("アーティスト名"),
                date: headers.indexOf("日程"),
                time: headers.indexOf("出番"),
                buppan: headers.indexOf("物販"),
                mail: headers.indexOf("メール"),
                line: headers.indexOf("LINE"),
                x: headers.indexOf("X"),
                pic: headers.indexOf("担当")
            };

            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const cols = rows[i].split('\t');
                
                const artistObj = {
                    id: 'art_' + i + '_' + Date.now() + Math.random().toString(36).substr(2, 4),
                    waku: indexSlot.waku !== -1 ? (cols[indexSlot.waku] || '').trim() : '',
                    flag: indexSlot.flag !== -1 ? (cols[indexSlot.flag] || '').trim() : '',
                    yomi: indexSlot.yomi !== -1 ? (cols[indexSlot.yomi] || '').trim() : '',
                    name: indexSlot.name !== -1 ? (cols[indexSlot.name] || '').trim() : '',
                    date: indexSlot.date !== -1 ? (cols[indexSlot.date] || '').trim() : '',
                    time: indexSlot.time !== -1 ? (cols[indexSlot.time] || '').trim() : '',
                    buppan: indexSlot.buppan !== -1 ? (cols[indexSlot.buppan] || '').trim() : '',
                    mail: indexSlot.mail !== -1 ? (cols[indexSlot.mail] || '').trim() : '',
                    line: indexSlot.line !== -1 ? (cols[indexSlot.line] || '').trim() : '',
                    x: indexSlot.x !== -1 ? (cols[indexSlot.x] || '').trim() : '',
                    pic: indexSlot.pic !== -1 ? (cols[indexSlot.pic] || '').trim() : ''
                };

                if (artistObj.name) {
                    parsedList.push(artistObj);
                }
            }
            return parsedList;
        }

        function serializeArtistObjectsToTsv() {
            const headerRow = "枠名\t出演\tヨミ\tアーティスト名\t日程\t出番\t物販\tメール\tLINE\tX\t担当者";
            const dataRows = appState.artists.map(a => {
                return `${a.waku}\t${a.flag}\t${a.yomi}\t${a.name}\t${a.date}\t${a.time}\t${a.buppan}\t${a.mail}\t${a.line}\t${a.x}\t${a.pic}`;
            });
            return [headerRow, ...dataRows].join('\n');
        }

        // Render Pipelines
        function renderApplicationView() {
            buildTagFilterInterface();
            buildArtistTableInterface();
            buildTemplateDropdownOptions();
            refreshPreviewTextDisplay();
            refreshActionPaneState();
        }

        function buildTagFilterInterface() {
            const filterContainer = document.getElementById('tag-filters');
            
            // Collect unique tags/pics
            const tagsSet = new Set();
            appState.artists.forEach(a => {
                if (a.pic) tagsSet.add(a.pic);
            });

            let htmlString = `<button class="filter-btn ${appState.activeFilterTag === 'ALL' ? 'active' : ''}" onclick="setFilterTagValue('ALL')">すべて</button>`;
            htmlString += `<button class="filter-btn ${appState.activeFilterTag === '出演者' ? 'active' : ''}" onclick="setFilterTagValue('出演者')">🚩 出演</button>`;
            
            tagsSet.forEach(tag => {
                htmlString += `<button class="filter-btn ${appState.activeFilterTag === tag ? 'active' : ''}" onclick="setFilterTagValue('${tag}')">${tag}</button>`;
            });

            filterContainer.innerHTML = htmlString;
        }

        // Helper to format date strings by removing "日" and weekday parts
        function cleanDateString(dateStr) {
            if (!dateStr) return '';
            // 1. Remove standard weekday patterns like (日), (月), etc.
            let clean = dateStr.replace(/\([日月火水木金土]\)/g, '');
            // 2. Remove trailing "日" only if it looks like part of a weekday string context, 
            // but carefully matching cases like "6/14日" or "14日" -> "6/14" or "14"
            clean = clean.replace(/(\d+月\d+|\d+\/\d+|\d+)日/g, '$1');
            return clean.trim();
        }

        function buildArtistTableInterface() {
            const tableBody = document.getElementById('artist-table-body');
            const searchPattern = document.getElementById('search-input').value.toLowerCase().trim();

            // Filter context
            let targetRecords = appState.artists.filter(artist => {
                // Search query match
                const matchQuery = !searchPattern || 
                                   artist.name.toLowerCase().includes(searchPattern) || 
                                   artist.yomi.toLowerCase().includes(searchPattern) || 
                                   artist.pic.toLowerCase().includes(searchPattern);
                
                if (!matchQuery) return false;

                // Tag context filter
                if (appState.activeFilterTag === 'ALL') return true;
                if (appState.activeFilterTag === '出演者') return artist.flag === '🚩';
                return artist.pic === appState.activeFilterTag;
            });

            // Sorting engine
            targetRecords.sort((alpha, beta) => {
                let valueAlpha = alpha[appState.currentSortField] || '';
                let valueBeta = beta[appState.currentSortField] || '';

                // Treat numeric comparison for yomi if it contains values
                if (appState.currentSortField === 'yomi') {
                    const numAlpha = parseInt(valueAlpha) || 0;
                    const numBeta = parseInt(valueBeta) || 0;
                    if (numAlpha !== numBeta) {
                        return appState.currentSortAscending ? numAlpha - numBeta : numBeta - numAlpha;
                    }
                }

                if (valueAlpha < valueBeta) return appState.currentSortAscending ? -1 : 1;
                if (valueAlpha > valueBeta) return appState.currentSortAscending ? 1 : -1;
                return 0;
            });

            // Inject DOM
            if (targetRecords.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--text-secondary); padding:20px;">該当するデータがありません</td></tr>`;
                document.getElementById('row-count-display').innerText = `0 件表示 / 全 ${appState.artists.length} 件`;
                return;
            }

            const yomiOptions = ['-', '0', '1', '2', '4', '6', '8', '10'];

            let htmlBuffer = '';
            targetRecords.forEach(artist => {
                const isSelected = (artist.id === appState.selectedArtistId);
                const displayDate = cleanDateString(artist.date);

                // Build option elements for yomi select
                let yomiOptionsHtml = '';
                yomiOptions.forEach(opt => {
                    const optVal = opt === '-' ? '' : opt;
                    const isOptSelected = (artist.yomi === optVal) ? 'selected' : '';
                    yomiOptionsHtml += `<option value="${optVal}" ${isOptSelected}>${opt}</option>`;
                });

                htmlBuffer += `
                    <tr class="${isSelected ? 'selected' : ''}" onclick="handleRowSelectionChange('${artist.id}', event)">
                        <td class="flag-cell" onclick="event.stopPropagation();">
                            <select class="flag-select" style="font-size: 0.75rem;" onchange="handleInlineFlagUpdate('${artist.id}', this.value)">
                                <option value="" ${artist.flag === '' ? 'selected' : ''}>-</option>
                                <option value="🚩" ${artist.flag === '🚩' ? 'selected' : ''}>🚩</option>
                            </select>
                        </td>
                        <td style="font-weight:600;" title="${artist.name}">${artist.name}</td>
                        <td onclick="event.stopPropagation();">
                            <select class="yomi-select" onchange="handleInlineYomiUpdate('${artist.id}', this.value)">
                                ${yomiOptionsHtml}
                            </select>
                        </td>
                        <td title="${displayDate}">${displayDate}</td>
                        <td title="${artist.time}">${artist.time}</td>
                        <td>${artist.pic}</td>
                    </tr>
                `;
            });

            tableBody.innerHTML = htmlBuffer;
            document.getElementById('row-count-display').innerText = `${targetRecords.length} 件表示 / 全 ${appState.artists.length} 件`;
        }

        function buildTemplateDropdownOptions() {
            const dropdown = document.getElementById('active-template-select');
            let optionsHtml = '';
            appState.templates.forEach((tpl, idx) => {
                optionsHtml += `<option value="${idx}" ${idx === appState.selectedTemplateIndex ? 'selected' : ''}>${tpl.title}</option>`;
            });
            dropdown.innerHTML = optionsHtml;
        }

        function refreshPreviewTextDisplay() {
            const container = document.getElementById('message-preview-container');
            if (!appState.selectedArtistId) {
                container.innerText = "演者を選択するとここに生成文面が表示されます。";
                return;
            }

            const currentArtist = appState.artists.find(a => a.id === appState.selectedArtistId);
            if (!currentArtist || appState.templates.length === 0) {
                container.innerText = "データ構成エラー";
                return;
            }

            const activeTemplate = appState.templates[appState.selectedTemplateIndex];
            container.innerText = compileMessageTemplate(activeTemplate.body, currentArtist);
        }

        function compileMessageTemplate(templateBody, artist) {
            if (!templateBody) return '';
            return templateBody
                .replace(/{枠名}/g, artist.waku || '')
                .replace(/{出演}/g, artist.flag || '')
                .replace(/{ヨミ}/g, artist.yomi || '')
                .replace(/{アーティスト名}/g, artist.name || '')
                .replace(/{日程}/g, cleanDateString(artist.date))
                .replace(/{出番}/g, artist.time || '')
                .replace(/{物販}/g, artist.buppan || '')
                .replace(/{メール}/g, artist.mail || '')
                .replace(/{LINE}/g, artist.line || '')
                .replace(/{X}/g, artist.x || '')
                .replace(/{担当}/g, artist.pic || '');
        }

        function refreshActionPaneState() {
            const summaryBox = document.getElementById('active-artist-summary');
            const btnLine = document.getElementById('action-btn-line');
            const btnX = document.getElementById('action-btn-x');
            const btnGmail = document.getElementById('action-btn-gmail');

            if (!appState.selectedArtistId) {
                summaryBox.innerHTML = "選択なし";
                btnLine.disabled = true;
                btnX.disabled = true;
                btnGmail.disabled = true;
                return;
            }

            const artist = appState.artists.find(a => a.id === appState.selectedArtistId);
            if (!artist) return;

            // Update bottom info summary layout
            let targetChannelsHtml = '';
            if (artist.line) targetChannelsHtml += `<span class="badge badge-line">LINE</span>`;
            if (artist.x) targetChannelsHtml += `<span class="badge badge-x">X</span>`;
            if (artist.mail) targetChannelsHtml += `<span class="badge badge-gmail">Gmail</span>`;
            
            summaryBox.innerHTML = `<span>${artist.name}</span>${targetChannelsHtml || '宛先なし'}`;

            // Toggle active buttons explicitly based on template/data existence
            const hasTemplate = appState.templates.length > 0;
            btnLine.disabled = !(artist.line && hasTemplate);
            btnX.disabled = !(artist.x && hasTemplate);
            btnGmail.disabled = !(artist.mail && hasTemplate);
        }

        // Action Handlers
        function switchTab(tabKey) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            if (tabKey === 'list') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('tab-list').classList.add('active');
            } else if (tabKey === 'preview') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('tab-preview').classList.add('active');
                refreshPreviewTextDisplay();
            } else if (tabKey === 'settings') {
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
                document.getElementById('tab-settings').classList.add('active');
            }
        }

        function handleFilterChange() {
            buildArtistTableInterface();
        }

        function setFilterTagValue(tag) {
            appState.activeFilterTag = tag;
            buildTagFilterInterface();
            buildArtistTableInterface();
        }

        function handleSort(fieldName) {
            if (appState.currentSortField === fieldName) {
                appState.currentSortAscending = !appState.currentSortAscending;
            } else {
                appState.currentSortField = fieldName;
                appState.currentSortAscending = true;
            }
            buildArtistTableInterface();
        }

        function handleRowSelectionChange(artistId, event) {
            if (appState.selectedArtistId === artistId) {
                appState.selectedArtistId = null;
            } else {
                appState.selectedArtistId = artistId;
            }
            buildArtistTableInterface();
            refreshPreviewTextDisplay();
            refreshActionPaneState();
        }

        function handleInlineFlagUpdate(artistId, value) {
            const target = appState.artists.find(a => a.id === artistId);
            if (target) {
                target.flag = value;
                const updatedTsv = serializeArtistObjectsToTsv();
                document.getElementById('import-artists-raw').value = updatedTsv;
                localStorage.setItem('amp_artists_raw', updatedTsv);
                buildTagFilterInterface();
                refreshActionPaneState();
            }
        }

        function handleInlineYomiUpdate(artistId, value) {
            const target = appState.artists.find(a => a.id === artistId);
            if (target) {
                target.yomi = value;
                const updatedTsv = serializeArtistObjectsToTsv();
                document.getElementById('import-artists-raw').value = updatedTsv;
                localStorage.setItem('amp_artists_raw', updatedTsv);
                // Instant re-sort and render to maintain current list integrity
                buildArtistTableInterface();
            }
        }

        function handleTemplateSelectChange() {
            appState.selectedTemplateIndex = parseInt(document.getElementById('active-template-select').value) || 0;
            refreshPreviewTextDisplay();
        }

        // Clipboard Procedure Logic
        function executeClipboardCopyProcedure(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
            } catch (err) {
                console.error('Fallback copy operation failed', err);
            }
            document.body.removeChild(textArea);
        }

        function showToastBanner(message) {
            const toast = document.getElementById('toast-banner');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function executeExternalDispatch(platformKey) {
            if (!appState.selectedArtistId || appState.templates.length === 0) return;
            
            const currentArtist = appState.artists.find(a => a.id === appState.selectedArtistId);
            if (!currentArtist) return;

            const activeTemplate = appState.templates[appState.selectedTemplateIndex];
            const messageBody = compileMessageTemplate(activeTemplate.body, currentArtist);

            if (platformKey === 'line') {
                executeClipboardCopyProcedure(messageBody);
                showToastBanner("本文をコピーしました。LINEを開きます");
                setTimeout(() => {
                    window.location.href = currentArtist.line;
                }, 800);
            } else if (platformKey === 'x') {
                executeClipboardCopyProcedure(messageBody);
                showToastBanner("本文をコピーしました。Xを開きます");
                setTimeout(() => {
                    const xAccount = currentArtist.x.replace('@', '');
                    window.location.href = `https://x.com/messages/compose?recipient_id=${xAccount}`;
                }, 800);
            } else if (platformKey === 'gmail') {
                const mailToAddress = currentArtist.mail || '';
                const currentTemplate = appState.templates[appState.selectedTemplateIndex];
                const subjectLine = currentTemplate.title || 'ご連絡';
                
                // Copy message contents beforehand as safety mechanism
                executeClipboardCopyProcedure(messageBody);
                
                // Construct Gmail Specific deep link schemes
                const gmailAppUrl = `googlegmail:///co?to=${encodeURIComponent(mailToAddress)}&subject=${encodeURIComponent(subjectLine)}&body=${encodeURIComponent(messageBody)}`;
                
                showToastBanner("コピー＆Gmailアプリを起動します");
                
                setTimeout(() => {
                    // Force execute deep-link trigger
                    window.location.href = gmailAppUrl;
                    
                    // Fallback to Web UI representation if the app fails to intercept in 1.5 seconds
                    setTimeout(() => {
                        if (!document.hidden) {
                            window.location.href = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(mailToAddress)}&su=${encodeURIComponent(subjectLine)}&body=${encodeURIComponent(messageBody)}`;
                        }
                    }, 1500);
                }, 800);
            }
        }

        // Settings Management
        function saveArtistsFromTextarea() {
            const rawText = document.getElementById('import-artists-raw').value;
            localStorage.setItem('amp_artists_raw', rawText);
            appState.artists = parseTsvToArtistObjects(rawText);
            
            // Reset selection safely if missing
            if (!appState.artists.some(a => a.id === appState.selectedArtistId)) {
                appState.selectedArtistId = null;
            }

            renderApplicationView();
            showToastBanner("演者マスタを更新しました");
        }

        function refreshTemplateEditorStructure() {
            const listContainer = document.getElementById('template-editor-list');
            let htmlBuffer = '';
            
            appState.templates.forEach((tpl, index) => {
                htmlBuffer += `
                    <div class="template-item-edit" data-index="${index}">
                        <input type="text" class="tpl-edit-title" value="${tpl.title}" placeholder="テンプレートタイトル">
                        <textarea class="tpl-edit-body" placeholder="テンプレート本文 (タグ使用可能: {アーティスト名}, {日程}, {出番} 等)">${tpl.body}</textarea>
                        <div class="template-ctrls">
                            <span style="font-size:0.7rem; color:var(--text-secondary);">ID: ${tpl.id}</span>
                            <button class="small-btn danger" onclick="removeTemplateItemIndex(${index})"><i class="fas fa-trash"></i> 削除</button>
                        </div>
                    </div>
                `;
            });
            listContainer.innerHTML = htmlBuffer;
        }

        function addNewTemplateItem() {
            appState.templates.push({
                id: 'tpl_' + Date.now() + Math.random().toString(36).substr(2, 4),
                title: '新規テンプレート',
                body: ''
            });
            refreshTemplateEditorStructure();
        }

        function removeTemplateItemIndex(index) {
            appState.templates.splice(index, 1);
            refreshTemplateEditorStructure();
        }

        function saveTemplatesFromEditor() {
            const items = document.querySelectorAll('.template-editor-list .template-item-edit, #template-editor-list .template-item-edit');
            const newTemplates = [];

            items.forEach(dom => {
                const idx = dom.getAttribute('data-index');
                const title = dom.querySelector('.tpl-edit-title').value.trim();
                const body = dom.querySelector('.tpl-edit-body').value;
                const oldId = appState.templates[idx] ? appState.templates[idx].id : ('tpl_' + Date.now());

                if (title) {
                    newTemplates.push({ id: oldId, title: title, body: body });
                }
            });

            appState.templates = newTemplates;
            localStorage.setItem('amp_templates', JSON.stringify(appState.templates));
            
            // Re-bind indexes cleanly
            if (appState.selectedTemplateIndex >= appState.templates.length) {
                appState.selectedTemplateIndex = 0;
            }

            buildTemplateDropdownOptions();
            refreshTemplateEditorStructure();
            refreshPreviewTextDisplay();
            refreshActionPaneState();
            showToastBanner("テンプレートを保存しました");
        }
    </script>
</body>
</html>
